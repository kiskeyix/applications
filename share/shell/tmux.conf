set -g default-terminal "tmux-256color"
set-option -g set-titles on
set-option -g set-titles-string '#T'
unbind C-b
set -g prefix C-Space

# True color (24-bit)
set -as terminal-features 'xterm*:RGB'
set -g update-environment "COLORTERM"
set-environment -g COLORTERM truecolor

# Claude Code: extended key encoding (CSI u), image passthrough
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g allow-passthrough on

# Sixel image support (tmux 3.4+, built with --enable-sixel)
set -as terminal-features 'xterm*:sixel'

# Lower escape delay — default 500ms makes Esc feel sluggish
set -sg escape-time 10

# Claude Code can produce a lot of output; default 2000 lines is too low
set -g history-limit 50000

# Mouse — scroll through output, click panes
set -g mouse on

# Let apps detect when pane gains/loses focus
set -g focus-events on

# OSC 52 — copy from remote tmux to local system clipboard
set -g set-clipboard on
